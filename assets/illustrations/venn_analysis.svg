    <rect x="20" y="22" width="24" height="92" rx="8" fill="#60a5fa"/>
    <rect x="52" y="48" width="24" height="66" rx="8" fill="#34d399"/>
    <rect x="84" y="74" width="24" height="40" rx="8" fill="#f472b6"/>
    <g stroke="#64748b" stroke-width="2">
      <line x1="22" y1="130" x2="104" y2="130"/>
      <line x1="22" y1="142" x2="104" y2="142"/>
    </g>
    <g fill="#2563eb">
      <circle cx="34" cy="130" r="5"/><circle cx="66" cy="130" r="5"/><circle cx="98" cy="130" r="5"/>
