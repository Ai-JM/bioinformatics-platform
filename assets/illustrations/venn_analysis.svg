    <text x="24" y="38" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">two-column</text>
    <rect x="22" y="62" width="120" height="22" rx="8" fill="#dbeafe"/>
    <rect x="22" y="96" width="120" height="22" rx="8" fill="#ccfbf1"/>
    <rect x="22" y="130" width="120" height="22" rx="8" fill="#fce7f3"/>
    <rect x="22" y="164" width="86" height="22" rx="8" fill="#fef3c7"/>
    <g fill="#2563eb" opacity=".78">
