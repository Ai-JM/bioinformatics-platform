<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 430" role="img" aria-label="集合分析与 Venn-UpSet 可视化">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0f9ff"/>
      <stop offset=".55" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#fdf2f8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#0f172a" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="760" height="430" rx="34" fill="url(#bg)"/>
  <circle cx="92" cy="70" r="38" fill="#bfdbfe" opacity=".55"/>
  <circle cx="675" cy="72" r="56" fill="#fbcfe8" opacity=".45"/>
  <circle cx="704" cy="335" r="46" fill="#bbf7d0" opacity=".45"/>

  <g filter="url(#shadow)">
    <rect x="62" y="58" width="636" height="314" rx="30" fill="url(#card)"/>
  </g>

  <g transform="translate(98 92)">
