      <circle cx="32" cy="107" r="4"/>
      <circle cx="32" cy="141" r="4"/>
      <circle cx="32" cy="175" r="4"/>
    </g>
  </g>

  <g transform="translate(286 82)">
    <circle cx="96" cy="120" r="74" fill="#93c5fd" opacity=".58"/>
    <circle cx="166" cy="120" r="74" fill="#5eead4" opacity=".58"/>
    <circle cx="132" cy="178" r="74" fill="#fde68a" opacity=".58"/>
    <circle cx="132" cy="138" r="34" fill="#ffffff" opacity=".85"/>
    <text x="132" y="146" text-anchor="middle" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="30" font-weight="800" fill="#0f172a">43</text>
    <text x="132" y="248" text-anchor="middle" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="18" font-weight="700" fill="#0369a1">Venn / Flower</text>
